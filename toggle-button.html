<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
        }

        body {
            background-color: rgb(17, 89, 149);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.5s ease;
        }


        body:has(#toggle:checked) {
            background-color: #070809;
        }

        .sky {
            width: 150px;
            height: 60px;
            background-color:  #87dceb;
            border-radius: 50px;
            position: relative;
            cursor: pointer;
            transition: background-color 0.5s ease;
            display: block;
        }


        .sky::before {
            content: '';
            position: absolute;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: #fffb00;
            top: 5px;
            left: 5px;
            transition: transform 0.5s ease, background-color 0.5s ease;
        }


        #toggle {
            display: none;
        }




        #toggle:checked~.sky {
            background-color: #2C3E50;
        }


        #toggle:checked~.sky::before {
            transform: translateX(90px);
            background-color: #F5F3E5;
        }
    </style>
</head>

<body>
    <input type="checkbox" id="toggle">
    <label for="toggle" class="sky">
        <div class="crater"></div>
        <div class="star s1"></div>
        <div class="star s2"></div>
    </label>
</body>

</html>
